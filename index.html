<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VK Runner Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #000;
      touch-action: none; -webkit-user-select: none; user-select: none;
      font-family: 'Segoe UI', system-ui, sans-serif; color: #fff;
    }
    canvas { display: block; width: 100%; height: 100%; }
    
    .ui {
      position: absolute; top: 10px; left: 10px; right: 10px;
      display: flex; justify-content: space-between; align-items: flex-start;
      pointer-events: none; z-index: 100;
    }
    
    .score-box {
      background: rgba(0,0,0,0.8); padding: 12px 18px; border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.2); pointer-events: auto;
    }
    
    .score { font-size: 1.5rem; font-weight: bold; color: #fff; margin-bottom: 5px; }
    .coins { font-size: 1.2rem; color: #ffd700; }
    
    .controls { display: flex; gap: 10px; pointer-events: auto; }
    
    .btn-small {
      background: rgba(255,255,255,0.25); border: 2px solid rgba(255,255,255,0.4);
      color: white; padding: 12px 16px; border-radius: 10px; cursor: pointer;
      font-size: 1.4rem; transition: all 0.2s; min-width: 50px;
    }
    
    .btn-small:hover { background: rgba(255,255,255,0.35); transform: scale(1.1); }
    .btn-small:active { transform: scale(0.95); }
    .btn-small.muted { background: rgba(255,80,80,0.5); border-color: rgba(255,80,80,0.8); }
    
    .overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.95);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; z-index: 200; padding: 20px;
    }
    
    .overlay.active { display: flex; }
    
    .menu-title {
      font-size: 3rem; font-weight: bold; margin-bottom: 15px;
      background: linear-gradient(135deg, #4a76a8, #7ec850, #ffd700);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: glow 2s ease-in-out infinite;
    }
    
    @keyframes glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
    }
    
    .btn {
      padding: 16px 40px; font-size: 1.2rem; border: none; border-radius: 12px;
      cursor: pointer; transition: all 0.2s; font-weight: bold; min-width: 280px;
    }
    
    .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
    .btn:active { transform: translateY(-1px); }
    
    .btn-primary {
      background: linear-gradient(135deg, #4a76a8, #6b9bd1);
      color: white; border: 2px solid rgba(255,255,255,0.2);
    }
    
    .btn-warning {
      background: linear-gradient(135deg, #f39c12, #f1c40f);
      color: #000; border: 2px solid rgba(255,255,255,0.2);
    }
    
    .btn-danger {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: white; border: 2px solid rgba(255,255,255,0.2);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.15);
      color: white; border: 2px solid rgba(255,255,255,0.3);
    }
    
    .hint { font-size: 0.95rem; color: #aaa; text-align: center; max-width: 90%; line-height: 1.6; margin-top: 10px; }
    
    .menu-stats {
      background: rgba(255,255,255,0.1); padding: 25px 35px;
      border-radius: 12px; margin: 10px 0; text-align: center;
      border: 2px solid rgba(255,255,255,0.1);
    }
    
    .stat-row {
      display: flex; justify-content: space-between; gap: 40px;
      margin: 10px 0; font-size: 1.1rem;
    }
    
    .stat-label { color: #aaa; }
    .stat-value { color: #ffd700; font-weight: bold; font-size: 1.3rem; }
    
    .loading {
      color: #7ec850; font-size: 1.5rem; font-weight: bold;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.95); }
    }
    
    .pause-menu {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.98); padding: 40px;
      border-radius: 16px; border: 2px solid rgba(255,255,255,0.2);
      display: none; flex-direction: column; align-items: center; gap: 15px;
      z-index: 150; min-width: 300px;
    }
    
    .pause-menu.active { display: flex; }
    
    .save-indicator {
      position: absolute; bottom: 20px; right: 20px;
      background: rgba(126,200,80,0.95); color: white;
      padding: 12px 18px; border-radius: 10px;
      font-size: 1rem; display: none; animation: slideIn 0.3s;
      z-index: 300;
    }
    
    .save-indicator.show { display: block; }
    
    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>

  <canvas id="game"></canvas>

  <div class="ui" id="gameUI" style="display: none;">
    <div class="score-box">
      <div class="score">🏆 <span id="score">0</span></div>
      <div class="coins">💰 <span id="coins">0</span> (всего: <span id="totalCoins">0</span>)</div>
    </div>
    <div class="controls">
      <button class="btn-small" id="soundBtn" title="Звук">🔊</button>
      <button class="btn-small" id="pauseBtn" title="Пауза">⏸</button>
      <button class="btn-small" id="exitBtn" title="Выйти">🚪</button>
    </div>
  </div>

  <div class="overlay active" id="mainMenu">
    <h1 class="menu-title">🏃 VK Runner Pro</h1>
    <button class="btn btn-primary" id="playBtn">▶ Играть</button>
    <button class="btn btn-secondary" id="settingsBtn">⚙️ Настройки</button>
    <p class="hint">Управление: Пробел / Клик / Тап<br>Собирай монеты 💰, избегай камней 🪨</p>
  </div>

  <div class="pause-menu" id="pauseMenu">
    <h2 style="font-size: 2rem; margin-bottom: 10px;">⏸ Пауза</h2>
    <button class="btn btn-primary" id="resumeBtn">▶ Продолжить</button>
    <button class="btn btn-secondary" id="menuBtn"> В меню</button>
  </div>

  <div class="overlay" id="gameOverScreen">
    <h2 style="font-size: 2.5rem; color: #ff6b6b;">💥 Игра окончена</h2>
    <div class="menu-stats">
      <div class="stat-row">
        <span class="stat-label">Счёт:</span>
        <span class="stat-value" id="finalScore">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Рекорд:</span>
        <span class="stat-value" id="highScore">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Монеты:</span>
        <span class="stat-value" id="runCoins">0</span>
      </div>
    </div>
    <button class="btn btn-primary" id="restartBtn">🔄 Играть снова</button>
    <button class="btn btn-danger" id="exitGameOverBtn">🚪 Выйти</button>
  </div>

  <div class="overlay" id="settingsScreen">
    <h2 style="font-size: 2rem;">⚙️ Настройки</h2>
    <div class="menu-stats" style="min-width: 300px;">
      <div class="stat-row" style="flex-direction: column; gap: 15px;">
        <div style="display: flex; align-items: center; gap: 15px;">
          <span class="stat-label">🔊 Громкость:</span>
          <input type="range" id="volumeSlider" min="0" max="100" value="70" 
                 style="width: 150px; cursor: pointer;">
          <span id="volumeValue" class="stat-value">70%</span>
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px; text-align: left;">
          <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
            <input type="checkbox" id="musicToggle" checked style="width: 22px; height: 22px; cursor: pointer;">
            <span>🎵 Музыка</span>
          </label>
          <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
            <input type="checkbox" id="sfxToggle" checked style="width: 22px; height: 22px; cursor: pointer;">
            <span>🔔 Звуки</span>
          </label>
        </div>
      </div>
    </div>
    <button class="btn btn-secondary" id="closeSettingsBtn">Закрыть</button>
  </div>

  <div class="overlay" id="loadingScreen">
    <div class="loading">Загрузка...</div>
  </div>

  <div class="save-indicator" id="saveIndicator">💾 Сохранено!</div>

  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    // ============================================
    // === AUDIO SYSTEM
    // ============================================
    class AudioSystem {
      constructor() {
        this.enabled = true;
        this.musicEnabled = true;
        this.sfxEnabled = true;
        this.volume = 0.7;
        this.ctx = null;
        this.musicInterval = null;
        this.noteIndex = 0;
        this.isMenuMusic = false;
        this.menuNotes = [261.63, 0, 329.63, 0, 392.00, 0, 523.25, 0];
        this.gameNotes = [261.63, 329.63, 392.00, 523.25, 293.66, 349.23, 440.00, 587.33];
      }
      
      init() {
        if (!this.ctx) {
          try {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            console.log('✅ AudioContext created');
            return true;
          } catch (e) {
            console.error('❌ Audio init failed:', e);
            return false;
          }
        }
        return true;
      }
      
      playMenuMusic() {
        if (!this.musicEnabled || !this.ctx || !this.enabled) return;
        this.isMenuMusic = true;
        this.noteIndex = 0;
        
        const playNote = () => {
          if (!this.isMenuMusic || !this.musicEnabled || !this.enabled || !this.ctx) return;
          
          const freq = this.menuNotes[this.noteIndex];
          if (freq > 0) {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.frequency.value = freq;
            osc.type = 'sine';
            gain.gain.setValueAtTime(this.volume * 0.15, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.4);
            osc.start(this.ctx.currentTime);
            osc.stop(this.ctx.currentTime + 0.4);
          }
          
          this.noteIndex = (this.noteIndex + 1) % this.menuNotes.length;
        };
        
        playNote();
        this.musicInterval = setInterval(playNote, 500);
      }
      
      playGameMusic() {
        if (!this.musicEnabled || !this.ctx || !this.enabled) return;
        this.isMenuMusic = false;
        this.noteIndex = 0;
        
        const playNote = () => {
          if (this.isMenuMusic || !this.musicEnabled || !this.enabled || !this.ctx) return;
          
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.frequency.value = this.gameNotes[this.noteIndex];
          osc.type = 'sine';
          gain.gain.setValueAtTime(this.volume * 0.2, this.ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
          osc.start(this.ctx.currentTime);
          osc.stop(this.ctx.currentTime + 0.3);
          
          this.noteIndex = (this.noteIndex + 1) % this.gameNotes.length;
        };
        
        playNote();
        this.musicInterval = setInterval(playNote, 400);
      }
      
      stopMusic() {
        if (this.musicInterval) {
          clearInterval(this.musicInterval);
          this.musicInterval = null;
        }
        this.isMenuMusic = false;
      }
      
      playJump() {
        if (!this.sfxEnabled || !this.ctx || !this.enabled) return;
        this.playTone(300, 600, 0.15, 'square');
      }
      
      playCoin() {
        if (!this.sfxEnabled || !this.ctx || !this.enabled) return;
        this.playTone(1200, 1800, 0.08, 'sine');
        setTimeout(() => this.playTone(1800, 2400, 0.1, 'sine'), 40);
      }
      
      playCrash() {
        if (!this.sfxEnabled || !this.ctx || !this.enabled) return;
        this.playNoise(0.3);
      }
      
      playClick() {
        if (!this.sfxEnabled || !this.ctx || !this.enabled) return;
        this.playTone(800, 600, 0.05, 'sine');
      }
      
      playTone(fromFreq, toFreq, duration, type) {
        if (!this.ctx) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        osc.frequency.setValueAtTime(fromFreq, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(toFreq, this.ctx.currentTime + duration);
        osc.type = type;
        gain.gain.setValueAtTime(this.volume * 0.3, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        osc.start(this.ctx.currentTime);
        osc.stop(this.ctx.currentTime + duration);
      }
      
      playNoise(duration) {
        if (!this.ctx) return;
        const bufferSize = this.ctx.sampleRate * duration;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(this.volume * 0.4, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
        noise.connect(gain);
        gain.connect(this.ctx.destination);
        noise.start();
      }
      
      setVolume(val) { this.volume = val; }
      
      toggle() {
        this.enabled = !this.enabled;
        if (!this.enabled) {
          this.stopMusic();
        }
        return this.enabled;
      }
    }

    const audio = new AudioSystem();

    // ============================================
    // === VK BRIDGE
    // ============================================
    const bridge = window.vkBridge;
    let vkReady = false;
    
    async function initVK() {
      if (!bridge) return;
      try {
        await bridge.send('VKWebAppInit');
        vkReady = true;
        await loadCloudData();
      } catch (e) {
        console.warn('VK error:', e);
      }
    }
    initVK();

    // ============================================
    // === SAVE SYSTEM
    // ============================================
    let highScore = parseInt(localStorage.getItem('vk_runner_hs') || '0');
    let totalCoins = parseInt(localStorage.getItem('vk_runner_coins') || '0');
    
    async function saveToCloud(showIndicator = true) {
      localStorage.setItem('vk_runner_hs', highScore);
      localStorage.setItem('vk_runner_coins', totalCoins);
      
      if (vkReady) {
        try {
          await bridge.send('VKWebAppStorageSet', {
            key: 'vk_runner_save',
            value: JSON.stringify({
              highScore: highScore,
              totalCoins: totalCoins,
              lastSave: Date.now()
            })
          });
        } catch (e) {
          console.error('Cloud save error:', e);
        }
      }
      
      if (showIndicator) showSaveIndicator();
    }

    async function loadCloudData() {
      if (!vkReady) return;
      try {
        const result = await bridge.send('VKWebAppStorageGet', { key: 'vk_runner_save' });
        if (result && result.key && result.value) {
          const data = JSON.parse(result.value);
          if (data.highScore > highScore) highScore = data.highScore;
          if (data.totalCoins > totalCoins) totalCoins = data.totalCoins;
        }
      } catch (e) {
        console.log('No cloud save');
      }
    }

    function showSaveIndicator() {
      const indicator = document.getElementById('saveIndicator');
      indicator.classList.add('show');
      setTimeout(() => indicator.classList.remove('show'), 2000);
    }

    // ============================================
    // === CANVAS
    // ============================================
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let dpr = window.devicePixelRatio || 1;
    let W, H, floorY;

    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      floorY = H * 0.82;
    }
    window.addEventListener('resize', resize);
    resize();

    // ============================================
    // === ASSETS (coins and obstacles only)
    // ============================================
    const assets = {
      obstacle: new Image(),
      coin: new Image()
    };

    let assetsLoaded = 0;
    const totalAssets = 2;

    function loadAsset(name, src) {
      assets[name].onload = () => {
        assetsLoaded++;
        console.log(`✅ ${name}: ${assets[name].naturalWidth}x${assets[name].naturalHeight}`);
        if (assetsLoaded === totalAssets) {
          document.getElementById('loadingScreen').classList.remove('active');
        }
      };
      assets[name].onerror = () => {
        console.warn(`❌ ${src} failed`);
        assetsLoaded++;
        if (assetsLoaded === totalAssets) {
          document.getElementById('loadingScreen').classList.remove('active');
        }
      };
      assets[name].crossOrigin = 'anonymous';
      assets[name].src = src;
    }

    loadAsset('obstacle', 'assets/obstacle.png');
    loadAsset('coin', 'assets/coin.png');

    // ============================================
    // === ANIMATED PLAYER CHARACTER (DRAWN)
    // ============================================
    function drawPlayer(ctx, x, y, w, h, frame, isJumping) {
      const time = Date.now() * 0.01;
      const runCycle = isJumping ? 0 : Math.sin(frame * 0.5) * 0.3;
      
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(x + w/2, y + h, w * 0.4, h * 0.1, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Body (orange shirt)
      ctx.fillStyle = '#ff8c00';
      ctx.fillRect(x + w * 0.25, y + h * 0.25, w * 0.5, h * 0.4);
      
      // Shorts (dark blue)
      ctx.fillStyle = '#1a1a4e';
      ctx.fillRect(x + w * 0.25, y + h * 0.6, w * 0.5, h * 0.2);
      
      // Head
      ctx.fillStyle = '#fdbcb4';
      ctx.beginPath();
      ctx.arc(x + w * 0.6, y + h * 0.15, w * 0.18, 0, Math.PI * 2);
      ctx.fill();
      
      // Hair
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.arc(x + w * 0.6, y + h * 0.1, w * 0.18, Math.PI, 0);
      ctx.fill();
      ctx.fillRect(x + w * 0.42, y + h * 0.08, w * 0.18, w * 0.1);
      
      // Eye
      ctx.fillStyle = 'white';
      ctx.fillRect(x + w * 0.62, y + h * 0.12, w * 0.08, w * 0.08);
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(x + w * 0.66, y + h * 0.14, w * 0.04, w * 0.04);
      
      // Arms (animated)
      ctx.strokeStyle = '#fdbcb4';
      ctx.lineWidth = w * 0.08;
      ctx.lineCap = 'round';
      
      // Left arm
      ctx.beginPath();
      ctx.moveTo(x + w * 0.3, y + h * 0.3);
      ctx.lineTo(x + w * 0.15, y + h * 0.45 + Math.sin(time + frame) * h * 0.1);
      ctx.stroke();
      
      // Right arm
      ctx.beginPath();
      ctx.moveTo(x + w * 0.7, y + h * 0.3);
      ctx.lineTo(x + w * 0.85, y + h * 0.45 + Math.sin(time + frame + Math.PI) * h * 0.1);
      ctx.stroke();
      
      // Legs (animated)
      ctx.strokeStyle = '#fdbcb4';
      ctx.lineWidth = w * 0.1;
      
      // Left leg
      ctx.beginPath();
      ctx.moveTo(x + w * 0.35, y + h * 0.75);
      const leftKneeX = x + w * 0.3 + Math.sin(time + frame) * w * 0.1;
      const leftKneeY = y + h * 0.85;
      ctx.lineTo(leftKneeX, leftKneeY);
      ctx.lineTo(x + w * 0.25 + Math.sin(time + frame) * w * 0.15, y + h * 0.95);
      ctx.stroke();
      
      // Right leg
      ctx.beginPath();
      ctx.moveTo(x + w * 0.65, y + h * 0.75);
      const rightKneeX = x + w * 0.7 + Math.sin(time + frame + Math.PI) * w * 0.1;
      const rightKneeY = y + h * 0.85;
      ctx.lineTo(rightKneeX, rightKneeY);
      ctx.lineTo(x + w * 0.75 + Math.sin(time + frame + Math.PI) * w * 0.15, y + h * 0.95);
      ctx.stroke();
      
      // Shoes
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.ellipse(x + w * 0.25 + Math.sin(time + frame) * w * 0.15, y + h * 0.96, w * 0.12, h * 0.04, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x + w * 0.75 + Math.sin(time + frame + Math.PI) * w * 0.15, y + h * 0.96, w * 0.12, h * 0.04, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // ============================================
    // === GAME STATE
    // ============================================
    let score = 0, runCoins = 0;
    let isPlaying = false, isPaused = false, isGameOver = false;
    let gameSpeed = 5;
    let lastTime = 0;
    let animFrame = 0;

    let player = { x: 0, y: 0, w: 50, h: 60, vy: 0, grounded: true };
    let obstacles = [], coins = [], particles = [];
    let lastObstacleTime = 0, lastCoinTime = 0;
    let animId;

    // ============================================
    // === BACKGROUND
    // ============================================
    let bgOffset1 = 0, bgOffset2 = 0;
    
    function drawBackground() {
      ctx.clearRect(0, 0, W, H);
      
      // Sky
      const skyGrad = ctx.createLinearGradient(0, 0, 0, floorY);
      skyGrad.addColorStop(0, '#0f0c29');
      skyGrad.addColorStop(0.5, '#302b63');
      skyGrad.addColorStop(1, '#24243e');
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, W, floorY);
      
      // Stars
      ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
      for (let i = 0; i < 60; i++) {
        const x = ((i * 137.5 + 12345) % W);
        const y = ((i * 89.3 + 12345) % (floorY * 0.7));
        const twinkle = Math.sin(Date.now() * 0.001 + i) * 0.5 + 0.5;
        ctx.globalAlpha = twinkle;
        ctx.fillRect(x, y, 2, 2);
      }
      ctx.globalAlpha = 1;
      
      // Mountains
      bgOffset1 -= gameSpeed * 0.15;
      if (bgOffset1 <= -W) bgOffset1 = 0;
      
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.moveTo(0, floorY);
      for (let x = 0; x <= W; x += 0.5) {
        const mountainY = floorY - 50 - Math.abs(Math.sin((x + bgOffset1) * 0.008)) * 100;
        ctx.lineTo(x, mountainY);
      }
      ctx.lineTo(W, floorY);
      ctx.fill();
      
      // Hills
      bgOffset2 -= gameSpeed * 0.4;
      if (bgOffset2 <= -W) bgOffset2 = 0;
      
      ctx.fillStyle = '#2d5a3d';
      ctx.beginPath();
      ctx.moveTo(0, floorY);
      for (let x = 0; x <= W; x += 0.5) {
        const hillY = floorY - 25 - Math.abs(Math.sin((x + bgOffset2) * 0.012)) * 50;
        ctx.lineTo(x, hillY);
      }
      ctx.lineTo(W, floorY);
      ctx.fill();
      
      // Ground
      ctx.fillStyle = '#1a4a1a';
      ctx.fillRect(0, floorY, W, H - floorY);
      
      // Grass
      ctx.fillStyle = '#4a9a4a';
      ctx.fillRect(0, floorY, W, 8);
      
      const time = Date.now() * 0.001;
      ctx.fillStyle = '#3d8a3d';
      for (let x = 0; x < W; x += 15) {
        const h = 5 + Math.sin(x * 0.1 + time) * 3;
        ctx.fillRect(x, floorY - h, 2, h);
      }
    }

    // ============================================
    // === GAME LOGIC
    // ============================================
    function resetGame() {
      score = 0;
      runCoins = 0;
      gameSpeed = 5;
      player.x = W * 0.15;
      player.y = floorY - 60;
      player.vy = 0;
      player.grounded = true;
      obstacles = [];
      coins = [];
      particles = [];
      lastObstacleTime = 0;
      lastCoinTime = 0;
      animFrame = 0;
    }

    function jump() {
      if (!isPlaying || isPaused || isGameOver) return;
      if (player.grounded) {
        player.vy = -13;
        player.grounded = false;
        audio.playJump();
        createParticles(player.x + player.w/2, player.y + player.h, 6, '#8b7355');
      }
    }

    function createParticles(x, y, count, color) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y,
          vx: (Math.random() - 0.5) * 5,
          vy: (Math.random() - 0.5) * 5,
          life: 1,
          color,
          size: Math.random() * 5 + 3
        });
      }
    }

    const obstacleTypes = [
      { w: 30, h: 40, color: '#95a5a6' },
      { w: 40, h: 50, color: '#7f8c8d' },
      { w: 50, h: 60, color: '#34495e' }
    ];

    function spawnObjects() {
      const now = performance.now();
      
      if (now - lastObstacleTime > 1200 + Math.random() * 500) {
        const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
        obstacles.push({
          x: W,
          y: floorY - type.h,
          w: type.w,
          h: type.h,
          color: type.color
        });
        lastObstacleTime = now;
      }
      
      if (now - lastCoinTime > 800 + Math.random() * 400) {
        const count = Math.floor(Math.random() * 3) + 1;
        for (let i = 0; i < count; i++) {
          coins.push({
            x: W + i * 45,
            y: floorY - 90 - Math.random() * 60,
            w: 30, h: 30,
            bob: Math.random() * Math.PI * 2
          });
        }
        lastCoinTime = now;
      }
    }

    function checkCollision(a, b) {
      const pad = 10;
      return a.x + pad < b.x + b.w - pad &&
             a.x + a.w - pad > b.x + pad &&
             a.y + pad < b.y + b.h - pad &&
             a.y + a.h - pad > b.y + pad;
    }

    function update(dt) {
      if (!isPlaying || isPaused || isGameOver) return;

      player.vy += 0.65;
      player.y += player.vy;
      
      if (player.y + player.h >= floorY) {
        player.y = floorY - player.h;
        player.vy = 0;
        player.grounded = true;
      }

      // Animation frame
      if (player.grounded) {
        animFrame += gameSpeed * 0.1;
      }

      spawnObjects();

      for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.x -= gameSpeed;
        if (o.x + o.w < 0) obstacles.splice(i, 1);
        if (checkCollision(player, o)) {
          audio.playCrash();
          createParticles(player.x + player.w/2, player.y + player.h/2, 25, '#e74c3c');
          gameOver();
        }
      }

      const time = Date.now() / 200;
      for (let i = coins.length - 1; i >= 0; i--) {
        let c = coins[i];
        c.x -= gameSpeed;
        c.y += Math.sin(time + c.bob) * 0.4;
        if (c.x + c.w < 0) coins.splice(i, 1);
        if (checkCollision(player, c)) {
          runCoins++;
          totalCoins++;
          localStorage.setItem('vk_runner_coins', totalCoins);
          document.getElementById('coins').textContent = runCoins;
          document.getElementById('totalCoins').textContent = totalCoins;
          audio.playCoin();
          createParticles(c.x + c.w/2, c.y + c.h/2, 10, '#f1c40f');
          coins.splice(i, 1);
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life -= dt * 0.002;
        p.size *= 0.97;
        if (p.life <= 0) particles.splice(i, 1);
      }

      score += 0.1;
      gameSpeed = 5 + Math.floor(score / 100) * 0.5;
      document.getElementById('score').textContent = Math.floor(score);
    }

    function draw() {
      drawBackground();

      const time = Date.now() / 200;
      coins.forEach(c => {
        const scale = 0.8 + Math.sin(time + c.bob) * 0.25;
        if (assets.coin.complete && assets.coin.naturalWidth > 0) {
          ctx.save();
          ctx.translate(c.x + c.w/2, c.y + c.h/2);
          ctx.scale(scale, scale);
          ctx.drawImage(assets.coin, -c.w/2, -c.h/2, c.w, c.h);
          ctx.restore();
        } else {
          ctx.fillStyle = '#f1c40f';
          ctx.beginPath();
          ctx.arc(c.x + c.w/2, c.y + c.h/2, c.w/2 * scale, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      obstacles.forEach(o => {
        if (assets.obstacle.complete && assets.obstacle.naturalWidth > 0) {
          ctx.drawImage(assets.obstacle, o.x, o.y, o.w, o.h);
        } else {
          ctx.fillStyle = o.color || '#7f8c8d';
          ctx.fillRect(o.x, o.y, o.w, o.h);
          ctx.fillStyle = 'rgba(0,0,0,0.2)';
          ctx.fillRect(o.x + 5, o.y + 5, o.w - 10, o.h - 10);
        }
      });

      // FIXED: Draw animated player character
      drawPlayer(ctx, player.x, player.y, player.w, player.h, animFrame, !player.grounded);

      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
    }

    function loop(timestamp) {
      const dt = timestamp - lastTime;
      lastTime = timestamp;
      update(dt);
      draw();
      animId = requestAnimationFrame(loop);
    }

    // ============================================
    // === GAME CONTROL
    // ============================================
    function startGame() {
      if (!audio.ctx) {
        audio.init();
      }
      audio.stopMusic();
      audio.playGameMusic();
      
      resetGame();
      isPlaying = true;
      isPaused = false;
      isGameOver = false;
      
      document.getElementById('mainMenu').classList.remove('active');
      document.getElementById('gameOverScreen').classList.remove('active');
      document.getElementById('gameUI').style.display = 'flex';
      document.getElementById('pauseMenu').classList.remove('active');
      
      document.getElementById('coins').textContent = '0';
      document.getElementById('totalCoins').textContent = totalCoins;
      updateSoundButton();
      
      lastTime = performance.now();
      loop(lastTime);
    }

    function pauseGame() {
      isPaused = true;
      audio.stopMusic();
      document.getElementById('pauseMenu').classList.add('active');
    }

    function resumeGame() {
      isPaused = false;
      if (audio.musicEnabled && audio.enabled) {
        audio.playGameMusic();
      }
      document.getElementById('pauseMenu').classList.remove('active');
      lastTime = performance.now();
    }

    async function exitAndSave() {
      isPlaying = false;
      isPaused = false;
      isGameOver = false;
      cancelAnimationFrame(animId);
      audio.stopMusic();
      await saveToCloud(true);
      
      document.getElementById('pauseMenu').classList.remove('active');
      document.getElementById('gameOverScreen').classList.remove('active');
      document.getElementById('gameUI').style.display = 'none';
      document.getElementById('mainMenu').classList.add('active');
      
      setTimeout(() => {
        if (!audio.ctx) audio.init();
        audio.playMenuMusic();
      }, 100);
    }

    function gameOver() {
      isPlaying = false;
      isGameOver = true;
      cancelAnimationFrame(animId);
      audio.stopMusic();
      
      if (Math.floor(score) > highScore) {
        highScore = Math.floor(score);
        localStorage.setItem('vk_runner_hs', highScore);
      }
      
      saveToCloud(false);
      
      document.getElementById('finalScore').textContent = Math.floor(score);
      document.getElementById('highScore').textContent = highScore;
      document.getElementById('runCoins').textContent = runCoins;
      document.getElementById('gameOverScreen').classList.add('active');
      document.getElementById('gameUI').style.display = 'none';
    }

    // ============================================
    // === INPUT
    // ============================================
    window.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        if (isPlaying && !isPaused) jump();
      }
      if (e.code === 'Escape') {
        if (isPlaying && !isGameOver) {
          if (isPaused) resumeGame();
          else pauseGame();
        }
      }
    });
    
    window.addEventListener('mousedown', () => {
      if (isPlaying && !isPaused) jump();
    });
    
    window.addEventListener('touchstart', e => {
      if (isPlaying && !isPaused) {
        e.preventDefault();
        jump();
      }
    }, { passive: false });

    // ============================================
    // === UI BUTTONS
    // ============================================
    function updateSoundButton() {
      const btn = document.getElementById('soundBtn');
      btn.textContent = audio.enabled ? '🔊' : '🔇';
      btn.classList.toggle('muted', !audio.enabled);
    }

    document.getElementById('playBtn').addEventListener('click', () => {
      audio.playClick();
      startGame();
    });
    
    document.getElementById('restartBtn').addEventListener('click', () => {
      audio.playClick();
      startGame();
    });
    
    document.getElementById('resumeBtn').addEventListener('click', () => {
      audio.playClick();
      resumeGame();
    });
    
    document.getElementById('menuBtn').addEventListener('click', () => {
      audio.playClick();
      exitAndSave();
    });
    
    document.getElementById('exitGameOverBtn').addEventListener('click', () => {
      audio.playClick();
      exitAndSave();
    });
    
    document.getElementById('settingsBtn').addEventListener('click', () => {
      audio.playClick();
      document.getElementById('settingsScreen').classList.add('active');
    });
    
    document.getElementById('closeSettingsBtn').addEventListener('click', () => {
      audio.playClick();
      document.getElementById('settingsScreen').classList.remove('active');
    });
    
    document.getElementById('pauseBtn').addEventListener('click', () => {
      audio.playClick();
      pauseGame();
    });
    
    document.getElementById('exitBtn').addEventListener('click', () => {
      audio.playClick();
      exitAndSave();
    });
    
    document.getElementById('soundBtn').addEventListener('click', () => {
      audio.playClick();
      audio.toggle();
      updateSoundButton();
    });

    document.getElementById('volumeSlider').addEventListener('input', e => {
      const val = parseInt(e.target.value) / 100;
      audio.setVolume(val);
      document.getElementById('volumeValue').textContent = e.target.value + '%';
    });
    
    document.getElementById('musicToggle').addEventListener('change', e => {
      audio.musicEnabled = e.target.checked;
      if (audio.musicEnabled && isPlaying && !isPaused && audio.enabled) {
        audio.playGameMusic();
      } else if (!audio.musicEnabled) {
        audio.stopMusic();
      }
    });
    
    document.getElementById('sfxToggle').addEventListener('change', e => {
      audio.sfxEnabled = e.target.checked;
    });

    // ============================================
    // === INIT
    // ============================================
    document.getElementById('highScore').textContent = highScore;
    document.getElementById('totalCoins').textContent = totalCoins;
    updateSoundButton();
    
    let audioInitialized = false;
    function initAudioAndMusic() {
      if (audioInitialized) return;
      audioInitialized = true;
      audio.init();
      audio.playMenuMusic();
    }
    
    document.addEventListener('click', initAudioAndMusic, { once: true });
    document.addEventListener('touchstart', initAudioAndMusic, { once: true });
  </script>
</body>
